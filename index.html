const appCache = {};
let currentApps = [];

let currentFilter = 'live';
let activeCompany = null;
let coSort = {key:'total', dir:'desc'};
var _pendingLoads = {};

window._loadCompany = function(name, data) {
  appCache[name] = data;
  if (_pendingLoads[name]) { _pendingLoads[name](); delete _pendingLoads[name]; }
};

function fmtNum(n) {
  if (n === null || n === undefined) return '-';
  n = Number(n);
  if (isNaN(n)) return '-';
  if (n >= 1e9) return (n/1e9).toFixed(1)+'B';
  if (n >= 1e6) return (n/1e6).toFixed(1)+'M';
  if (n >= 1e3) return (n/1e3).toFixed(1)+'K';
  return n.toLocaleString();
}

function parseDl(s) {
  if (!s) return 0;
  s = String(s).replace(/,/g,'').replace(/\+/g,'').trim();
  var m = s.match(/^([\d.]+)\s*([KMBkmb])?/);
  if (!m) return 0;
  var n = parseFloat(m[1]);
  var u = (m[2]||'').toUpperCase();
  if (u==='K') n*=1e3; else if (u==='M') n*=1e6; else if (u==='B') n*=1e9;
  return n;
}

function loadCompanyScript(name) {
  return new Promise(function(resolve) {
    if (appCache[name]) { resolve(); return; }
    _pendingLoads[name] = resolve;
    var s = document.createElement('script');
    s.src = 'data/' + encodeURIComponent(name) + '.js';
    s.onerror = function() { appCache[name] = []; delete _pendingLoads[name]; resolve(); };
    document.body.appendChild(s);
  });
}

function loadAllScripts() {
  var promises = companiesData.map(function(c) { return loadCompanyScript(c.name); });
  return Promise.all(promises);
}

  var totalApps = companiesData.reduce(function(s,c){return s+c.total_count;},0);
  var totalGP = companiesData.reduce(function(s,c){return s+c.gp_count;},0);
  var totalIOS = companiesData.reduce(function(s,c){return s+c.ios_count;},0);
  document.getElementById('totalCompanies').textContent = companiesData.length;
  document.getElementById('totalCount').textContent = totalApps;
  document.getElementById('gpCount').textContent = totalGP;
  document.getElementById('iosCount').textContent = totalIOS;
}

function renderCompanyTable() {
  var sorted = companiesData.slice();
  var key = coSort.key, dir = coSort.dir;
  sorted.sort(function(a,b) {
    var va, vb;
    if (key==='name') { va=a.name; vb=b.name; return dir==='asc'? va.localeCompare(vb,'zh'):vb.localeCompare(va,'zh'); }
    if (key==='devs') { va=a.developer_count; vb=b.developer_count; }
    else if (key==='gp') { va=a.gp_count; vb=b.gp_count; }
    else if (key==='ios') { va=a.ios_count; vb=b.ios_count; }
    else if (key==='total') { va=a.total_count; vb=b.total_count; }
    else if (key==='dl') { va=a.gp_downloads; vb=b.gp_downloads; }
    else if (key==='rat') { va=a.ios_ratings; vb=b.ios_ratings; }
    else if (key==='date') { va=a.latest_update||''; vb=b.latest_update||''; return dir==='asc'? va.localeCompare(vb):vb.localeCompare(va); }
    else { va=a.total_count; vb=b.total_count; }
    return dir==='asc'? va-vb : vb-va;
  });

  document.querySelectorAll('.company-overview th.sortable').forEach(function(th) {
    th.classList.remove('sort-asc','sort-desc');
    if (th.dataset.cosort === key) th.classList.add(dir==='asc'?'sort-asc':'sort-desc');
  });

  var q = document.getElementById('searchInput').value.trim().toLowerCase();
  var filtered = q ? sorted.filter(function(c) { return c.name.toLowerCase().indexOf(q) >= 0; }) : sorted;

  document.getElementById('companyInfo').textContent = '共 ' + filtered.length + ' 家公司';

  var tbody = document.getElementById('companyBody');
  tbody.innerHTML = '';
  filtered.forEach(function(c, i) {
    var cls = COMPANY_CLASS[c.name] || 'c1';
    var tr = document.createElement('tr');
    tr.innerHTML = '<td style="color:#94a3b8;font-size:12px">'+(i+1)+'</td>' +
      '<td><span class="company-tag '+cls+'" style="font-size:13px;padding:3px 10px;font-weight:700;cursor:pointer" data-company="'+c.name+'">'+c.name+'</span></td>' +
      '<td class="co-num">'+c.developer_count+'</td>' +
      '<td class="co-num">'+c.gp_count+'</td>' +
      '<td class="co-num">'+c.ios_count+'</td>' +
      '<td class="co-num" style="font-size:15px">'+c.total_count+'</td>' +
      '<td class="co-dl">'+fmtNum(c.gp_downloads)+'</td>' +
      '<td class="co-dl" style="color:#2563eb">'+fmtNum(c.ios_ratings)+'</td>' +
      '<td class="co-date">'+(c.latest_update||'-')+'</td>';
    tr.addEventListener('click', function() { showCompanyProducts(c.name); });
    tbody.appendChild(tr);
  });
}

function showCompanyProducts(companyName) {
  activeCompany = companyName;
  document.getElementById('searchInput').value = '';
  switchTab('products');
  document.getElementById('resultInfo').textContent = '加载中...';
  document.getElementById('listBody').innerHTML = '';
  document.getElementById('gridView').innerHTML = '';

  loadCompanyScript(companyName).then(function() {
    currentApps = appCache[companyName] || [];
    currentFilter = 'live';
    document.querySelectorAll('.filters .fbtn').forEach(function(b) { b.classList.toggle('active', b.dataset.filter==='live'); });
    renderProducts();
    document.getElementById('backRow').innerHTML = '<button class="back-btn" onclick="switchTab(\'company\')">← 返回公司总览</button> <span style="font-size:13px;color:#64748b;font-weight:600">'+companyName+'</span>';
  });
}

function showAllProducts() {
  activeCompany = null;
  document.getElementById('searchInput').value = '';
  switchTab('products');
  document.getElementById('resultInfo').textContent = '加载中...';
  document.getElementById('listBody').innerHTML = '';
  document.getElementById('gridView').innerHTML = '';

  loadAllScripts().then(function() {
    var all = [];
    companiesData.forEach(function(c) { all = all.concat(appCache[c.name] || []); });
    currentApps = all;
    currentFilter = 'live';
    document.querySelectorAll('.filters .fbtn').forEach(function(b) { b.classList.toggle('active', b.dataset.filter==='live'); });
    renderProducts();
    document.getElementById('backRow').innerHTML = '<button class="back-btn" onclick="switchTab(\'company\')">← 返回公司总览</button> <span style="font-size:13px;color:#64748b;font-weight:600">全部产品</span>';
  });
}

function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab-btn').forEach(function(b) { b.classList.toggle('active', b.dataset.tab === tab); });
  document.getElementById('companyTab').style.display = tab==='company' ? '' : 'none';
  document.getElementById('productsTab').style.display = tab==='products' ? '' : 'none';
  document.getElementById('filterBar').style.display = tab==='products' ? 'flex' : 'none';
  document.getElementById('viewToggle').style.display = tab==='products' ? 'flex' : 'none';
  if (tab === 'company') { renderCompanyTable(); }
}

function getFiltered() {
  var q = document.getElementById('searchInput').value.trim().toLowerCase();
  var list = currentApps;
  if (currentFilter === 'live') list = list.filter(function(a) { return !a.removed; });
  else if (currentFilter === 'removed') list = list.filter(function(a) { return a.removed; });
  else if (currentFilter === 'gp') list = list.filter(function(a) { return a.platform === 'GP'; });
  else if (currentFilter === 'ios') list = list.filter(function(a) { return a.platform === 'iOS'; });
  if (q) {
    list = list.filter(function(a) {
      return (a.name||'').toLowerCase().indexOf(q) >= 0 ||
        (a.pkg_or_id||'').toLowerCase().indexOf(q) >= 0 ||
        (a.company_cn||'').toLowerCase().indexOf(q) >= 0 ||
        (a.developer||'').toLowerCase().indexOf(q) >= 0 ||
        (a.tags||'').toLowerCase().indexOf(q) >= 0;
    });
  }
  return list;
}

function sortApps(list) {
  var key = currentSort.key, dir = currentSort.dir;
  var sorted = list.slice();
  sorted.sort(function(a,b) {
    var va, vb;
    if (key==='name') { va=(a.name||'').toLowerCase(); vb=(b.name||'').toLowerCase(); return dir==='asc'?va.localeCompare(vb):vb.localeCompare(va); }
    if (key==='dev') { va=(a.developer||'').toLowerCase(); vb=(b.developer||'').toLowerCase(); return dir==='asc'?va.localeCompare(vb):vb.localeCompare(va); }
    if (key==='dl') { va=parseDl(a.platform==='GP'?a.downloads:a.rating_count); vb=parseDl(b.platform==='GP'?b.downloads:b.rating_count); }
    else if (key==='update') { va=a.last_update||''; vb=b.last_update||''; return dir==='asc'?va.localeCompare(vb):vb.localeCompare(va); }
    else if (key==='release') { va=a.release_date||''; vb=b.release_date||''; return dir==='asc'?va.localeCompare(vb):vb.localeCompare(va); }
    else { va=0; vb=0; }
    return dir==='asc'?va-vb:vb-va;
  });
  return sorted;
}

function renderProducts() {
  var filtered = getFiltered();
  var sorted = sortApps(filtered);

  document.getElementById('resultInfo').textContent = '显示 ' + sorted.length + ' 条' + (activeCompany ? ' — '+activeCompany : '');

  document.querySelectorAll('#listView th.sortable').forEach(function(th) {
    th.classList.remove('sort-asc','sort-desc');
    if (th.dataset.sort === currentSort.key) th.classList.add(currentSort.dir==='asc'?'sort-asc':'sort-desc');
  });

  if (currentView === 'list') {
    document.getElementById('listView').style.display = '';
    document.getElementById('gridView').style.display = 'none';
    renderList(sorted);
  } else {
    document.getElementById('listView').style.display = 'none';
    document.getElementById('gridView').style.display = 'grid';
    renderGrid(sorted);
  }
}

function renderList(apps) {
  var tbody = document.getElementById('listBody');
  var fragment = document.createDocumentFragment();
  apps.forEach(function(app) {
    var tr = document.createElement('tr');
    if (app.removed) tr.className = 'removed-row';
    var cls = COMPANY_CLASS[app.company_cn] || 'c1';
    var platCls = app.platform==='GP'?'gp':'ios';
    var platLabel = app.platform==='GP'?'GP':'iOS';
    var metric = app.platform==='GP' ? (app.downloads||'-') : (app.rating_count ? fmtNum(parseDl(app.rating_count)) : '-');
    var devHtml = app.dev_link ? '<a href="'+app.dev_link+'" target="_blank" title="'+(app.developer||'')+'">'+(app.developer||'-')+'</a>' : (app.developer||'-');
    var pkgHtml = app.store_link ? '<a href="'+app.store_link+'" target="_blank" title="'+(app.pkg_or_id||'')+'">'+(app.pkg_or_id||'-')+'</a>' : (app.pkg_or_id||'-');
    var removedTag = app.removed ? ' <span class="removed-tag">已下架</span>' : '';

    tr.innerHTML = '<td><img class="icon-sm" src="'+(app.icon||'')+'" loading="lazy" onerror="this.style.display=\'none\'"></td>' +
      '<td class="name-cell" title="'+(app.name||'')+'">'+(app.name||'-')+removedTag+'</td>' +
      '<td><span class="platform-tag '+platCls+'">'+platLabel+'</span></td>' +
      '<td><span class="company-tag '+cls+'">'+(app.company_cn||'-')+'</span></td>' +
      '<td class="dev-cell" title="'+(app.developer||'')+'">'+devHtml+'</td>' +
      '<td class="pkg-cell" title="'+(app.pkg_or_id||'')+'">'+pkgHtml+'</td>' +
      '<td style="text-align:right;white-space:nowrap">'+metric+'</td>' +
      '<td style="white-space:nowrap">'+(app.last_update||'-')+'</td>' +
      '<td style="white-space:nowrap">'+(app.release_date||'-')+'</td>';
    fragment.appendChild(tr);
  });
  tbody.innerHTML = '';
  tbody.appendChild(fragment);
}

function renderGrid(apps) {
  var grid = document.getElementById('gridView');
  var fragment = document.createDocumentFragment();
  apps.forEach(function(app) {
    var card = document.createElement('div');
    card.className = 'app-card' + (app.removed?' removed':'');
    card.dataset.company = app.company_cn||'';
    var cls = COMPANY_CLASS[app.company_cn]||'c1';
    var platCls = app.platform==='GP'?'gp':'ios';
    var platLabel = app.platform==='GP'?'GP':'iOS';
    var metric = app.platform==='GP' ? (app.downloads||'-') : (app.rating_count ? fmtNum(parseDl(app.rating_count)) : '-');
    var metricLabel = app.platform==='GP' ? '下载量' : '评分数';
    var devHtml = app.dev_link ? '<a href="'+app.dev_link+'" target="_blank">'+(app.developer||'-')+'</a>' : (app.developer||'-');
    var tags = (app.tags||'').split(',').filter(function(t){return t.trim();}).map(function(t){return '<span class="tag">'+t.trim()+'</span>';}).join('');
    var removedBadge = app.removed ? '<span class="badge removed-b">已下架</span>' : '';

    card.innerHTML = removedBadge +
      '<div class="app-top">' +
        '<img class="app-icon" src="'+(app.icon||'')+'" loading="lazy" onerror="this.style.display=\'none\'">' +
        '<div class="app-info">' +
          '<div class="app-name">'+(app.store_link?'<a href="'+app.store_link+'" target="_blank">'+(app.name||'-')+'</a>':(app.name||'-'))+'</div>' +
          '<div class="app-dev">'+devHtml+'</div>' +
          '<div class="app-tags"><span class="platform-tag '+platCls+'">'+platLabel+'</span> <span class="company-tag '+cls+'">'+app.company_cn+'</span> '+tags+'</div>' +
        '</div>' +
      '</div>' +
      '<div class="app-meta">' +
        '<div class="meta-item"><div class="meta-label">'+metricLabel+'</div><div class="meta-value">'+metric+'</div></div>' +
        '<div class="meta-item"><div class="meta-label">更新日期</div><div class="meta-value">'+(app.last_update||'-')+'</div></div>' +
        '<div class="meta-item"><div class="meta-label">上架日期</div><div class="meta-value">'+(app.release_date||'-')+'</div></div>' +
        '<div class="meta-item"><div class="meta-label">包名/ID</div><div class="meta-value" style="font-size:9px;word-break:break-all">'+(app.pkg_or_id||'-')+'</div></div>' +
      '</div>';
    fragment.appendChild(card);
  });
  grid.innerHTML = '';
  grid.appendChild(fragment);
}

// Event listeners
document.querySelectorAll('.tab-btn').forEach(function(btn) {
  btn.addEventListener('click', function() {
    var tab = btn.dataset.tab;
    if (tab === 'products') {
      showAllProducts();
    } else {
      switchTab(tab);
    }
  });
});

document.getElementById('searchInput').addEventListener('input', function() {
  if (currentTab === 'company') {
    renderCompanyTable();
  } else {
    renderProducts();
  }
});

document.querySelectorAll('.filters .fbtn').forEach(function(btn) {
  btn.addEventListener('click', function() {
    currentFilter = btn.dataset.filter;
    document.querySelectorAll('.filters .fbtn').forEach(function(b) { b.classList.toggle('active', b.dataset.filter===currentFilter); });
    renderProducts();
  });
});

document.querySelectorAll('.view-toggle .vbtn').forEach(function(btn) {
  btn.addEventListener('click', function() {
    currentView = btn.dataset.view;
    document.querySelectorAll('.view-toggle .vbtn').forEach(function(b) { b.classList.toggle('active', b.dataset.view===currentView); });
    renderProducts();
  });
});

document.querySelectorAll('#listView th.sortable').forEach(function(th) {
  th.addEventListener('click', function() {
    var key = th.dataset.sort;
    if (currentSort.key === key) {
      currentSort.dir = currentSort.dir==='asc'?'desc':'asc';
    } else {
      currentSort = {key:key, dir:'desc'};
    }
    renderProducts();
  });
});

document.querySelectorAll('.company-overview th.sortable').forEach(function(th) {
  th.addEventListener('click', function() {
    var key = th.dataset.cosort;
    if (coSort.key === key) {
      coSort.dir = coSort.dir==='asc'?'desc':'asc';
    } else {
      coSort = {key:key, dir:'desc'};
    }
    renderCompanyTable();
  });
});

// Init
initStats();
renderCompanyTable();
</script>
</body>
</html>
